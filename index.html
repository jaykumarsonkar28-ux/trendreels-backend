<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            padding-bottom: 60px;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Right Side Buttons Container ↕️ */
        .reels-buttons {
            position: absolute;
            right: 15px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 12;
        }

        /* Individual Button Style 🔘 */
        .action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        .action-btn:active {
            transform: scale(0.9);
        }

        /* Profile aur Caption Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 80px;
            left: 15px;
            right: 80px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            pointer-events: auto;
        }
        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
            cursor: pointer;
        }
        .username {
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Follow Button Style 👥 */
        .follow-btn {
            background: #3897f0;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .follow-btn.following {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .reel-caption {
            font-size: 14px;
            color: #e6e6e6;
            pointer-events: auto;
        }

        /* Big Heart Animation Popup ❤️ */
        .heart-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 90px;
            z-index: 11;
            pointer-events: none;
            opacity: 0;
        }
        .heart-popup.animate {
            animation: heartPopEffect 0.7s ease-in-out forwards;
        }
        @keyframes heartPopEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* Global Comment Sheet 📋 */
        .comment-sheet {
            position: fixed;
            bottom: -60vh;
            left: 0;
            width: 100%;
            height: 55vh;
            background: #1a1a1a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 100;
            transition: bottom 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .comment-sheet.open {
            bottom: 0;
        }
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .comments-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .comment-item {
            margin-bottom: 12px;
            font-size: 14px;
        }
        .comment-user {
            font-weight: bold;
            color: #3897f0;
            margin-right: 5px;
        }
        .comment-input-area {
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
            background: #1a1a1a;
        }
        .new-comment-box {
            flex: 1;
            background: #262626;
            border: 1px solid #363636;
            border-radius: 20px;
            color: #fff;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .post-comment-btn {
            background: none;
            border: none;
            color: #3897f0;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        /* Creator Profile View Layout 👤 */
        .profile-view {
            position: fixed;
            top: 100vh;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 200;
            transition: top 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            padding: 20px;
            overflow-y: auto;
        }
        .profile-view.open {
            top: 0;
        }
        .profile-header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .profile-view-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-view-username {
            font-size: 20px;
            font-weight: bold;
        }
        .profile-view-bio {
            font-size: 14px;
            color: #ccc;
        }

        /* Personal Profile Screen Style 👤 */
        .my-profile-container {
            width: 100%;
            height: 100vh;
            background: #000;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }
        .stat-item num {
            font-size: 18px;
            font-weight: bold;
            display: block;
        }
        .stat-item txt {
            font-size: 12px;
            color: #aaa;
        }

        /* Nayi Search View Container Style 🔍 */
        .search-view-container {
            width: 100%;
            height: 100vh;
            background: #000;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        .search-bar-box {
            width: 100%;
            background: #262626;
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 10px 15px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }
        
        /* 3-Column Grid Post System 📊 */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-top: 10px;
        }
        .grid-post-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #222;
        }

        /* Custom Toast Notification Style 🍞 */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(26, 26, 26, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Bottom Navigation Bar Styles 🗺️ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #000;
            border-top: 1px solid #262626;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 250;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.1s;
        }
        .nav-btn.active {
            opacity: 1;
        }
        .nav-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer"></div>

    <div class="search-view-container" id="searchView" style="display: none;">
        <input type="text" class="search-bar-box" placeholder="🔍 Search creators or topics...">
        <div style="font-weight: bold; margin-bottom: 10px;">Explore</div>
        
        <div class="posts-grid">
            <img class="grid-post-img" src="https://picsum.photos/id/11/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/12/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/13/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/14/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/15/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/16/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/17/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/18/200/200" alt="explore">
            <img class="grid-post-img" src="https://picsum.photos/id/19/200/200" alt="explore">
        </div>
    </div>

    <div class="my-profile-container" id="myProfileView" style="display: none;">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">@my_username</div>
        
        <div style="display: flex; align-items: center; gap: 30px;">
            <img src="https://picsum.photos/id/1025/80/80" alt="my profile" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
            <div style="flex: 1;">
                <div class="stats-row">
                    <div class="stat-item"><num>15</num><txt>Posts</txt></div>
                    <div class="stat-item"><num>150</num><txt>Followers</txt></div>
                    <div class="stat-item"><num>180</num><txt>Following</txt></div>
                </div>
            </div>
        </div>

        <div style="margin-top: 15px; font-size: 14px;">
            <div style="font-weight: bold;">Jay Kumar Sonkar</div>
            <div style="color: #aaa; margin-top: 5px;">Building the future of TrendReels 🚀👨‍💻</div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button style="flex: 1; background: #262626; color: #fff; border: none; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 14px;">Edit Profile</button>
            <button style="flex: 1; background: #262626; color: #fff; border: none; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 14px;">Share Profile</button>
        </div>

        <hr style="border-color: #262626; margin-top: 20px; margin-bottom: 10px;">
        <div style="font-weight: bold; margin-bottom: 10px;">My Grid Posts</div>
        
        <div class="posts-grid">
            <img class="grid-post-img" src="https://picsum.photos/id/101/200/200" alt="post">
            <img class="grid-post-img" src="https://picsum.photos/id/102/200/200" alt="post">
            <img class="grid-post-img" src="https://picsum.photos/id/103/200/200" alt="post">
            <img class="grid-post-img" src="https://picsum.photos/id/104/200/200" alt="post">
            <img class="grid-post-img" src="https://picsum.photos/id/106/200/200" alt="post">
        </div>
    </div>

    <div class="comment-sheet" id="globalCommentSheet">
        <div class="sheet-header">
            <h3>Comments</h3>
            <button class="close-btn" id="globalCloseBtn">✕</button>
        </div>
        <div class="comments-list" id="globalCommentsList"></div>
        <div class="comment-input-area">
            <input type="text" class="new-comment-box" id="globalCommentInput" placeholder="Add a comment...">
            <button class="post-comment-btn" id="globalPostBtn">Post</button>
        </div>
    </div>

    <div class="profile-view" id="globalProfileView">
        <div class="profile-header-area">
            <span class="profile-view-username" id="pViewUsername">@username</span>
            <button class="close-btn" id="profileCloseBtn" style="font-size: 24px;">✕</button>
        </div>
        <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 15px;">
            <img class="profile-view-pic" id="pViewPic" src="" alt="profile">
            <div class="profile-view-bio" id="pViewBio">User bio description goes here...</div>
        </div>
        <hr style="border-color: #222; margin-bottom: 15px;">
        <h4 style="margin-bottom: 10px;">Posts</h4>
        <div class="posts-grid" id="pViewGrid"></div>
    </div>

    <div class="toast" id="toastBox">Link copied to clipboard! 🔗</div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="navHome">🏠</button>
        <button class="nav-btn" id="navSearch">🔍</button>
        <button class="nav-btn" id="navProfile">👤</button>
    </div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json?v=' + new Date().getTime();
        const container = document.getElementById('reelsContainer');
        
        let currentReelId = null;
        let currentCommentsArray = [];
        let currentPlayingVideo = null;

        function showToast(message) {
            const toast = document.getElementById('toastBox');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    card.dataset.id = reel.id;
                    
                    let isLiked = localStorage.getItem(`like_${reel.id}`) === 'true';
                    let likeIcon = isLiked ? '❤️' : '🤍';

                    let savedFollow = localStorage.getItem(`follow_${reel.username}`);
                    let currentFollowText = savedFollow ? savedFollow : (reel.follow_status || 'Follow');
                    let followClass = currentFollowText === 'Following' ? 'follow-btn following' : 'follow-btn';

                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop muted playsinline></video>
                        <div class="heart-popup">❤️</div>
                        
                        <div class="reels-buttons">
                            <button class="action-btn like-btn">${likeIcon}</button>
                            <button class="action-btn comment-btn">💬</button>
                            <button class="action-btn share-btn">🔗</button>
                        </div>

                        <div class="reel-overlay">
                            <div class="profile-section">
                                <img class="profile-pic" src="${reel.profile_pic || 'https://via.placeholder.com/35'}" alt="profile">
                                <span class="username">@${reel.username}</span>
                                <button class="${followClass}">${currentFollowText}</button>
                            </div>
                            <div class="reel-caption">${reel.caption}</div>
                        </div>
                    `;
                    
                    bindReelEvents(card, reel);
                    container.appendChild(card);
                }

                setupReelController();
                setupGlobalCommentSheet();
                setupGlobalProfileView();
                setupBottomNavigation();

            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        function bindReelEvents(card, reel) {
            const video = card.querySelector('.reel-video');
            const heart = card.querySelector('.heart-popup');
            const likeBtn = card.querySelector('.like-btn');
            const commentBtn = card.querySelector('.comment-btn');
            const shareBtn = card.querySelector('.share-btn');
            const followBtn = card.querySelector('.follow-btn');
            const profilePic = card.querySelector('.profile-pic');
            const usernameText = card.querySelector('.username');

            const triggerLike = (forceLike = false) => {
                let currentlyLiked = likeBtn.innerText === '❤️';
                if (forceLike) currentlyLiked = false;

                if (!currentlyLiked) {
                    likeBtn.innerText = '❤️';
                    localStorage.setItem(`like_${reel.id}`, 'true');
                } else {
                    likeBtn.innerText = '🤍';
                    localStorage.setItem(`like_${reel.id}`, 'false');
                }
            };
            likeBtn.addEventListener('click', () => triggerLike());

            followBtn.addEventListener('click', () => {
                if (followBtn.innerText === 'Follow') {
                    followBtn.innerText = 'Following';
                    followBtn.classList.add('following');
                    localStorage.setItem(`follow_${reel.username}`, 'following');
                } else {
                    followBtn.innerText = 'Follow';
                    followBtn.classList.remove('following');
                    localStorage.setItem(`follow_${reel.username}`, 'Follow');
                }
            });

            shareBtn.addEventListener('click', async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: reel.title || 'TrendReels Video',
                            text: reel.caption,
                            url: reel.video_url
                        });
                    } catch (err) {
                        console.log("Share cancelled");
                    }
                } else {
                    navigator.clipboard.writeText(reel.video_url);
                    showToast("Video link copied to clipboard! 🔗");
                }
            });

            commentBtn.addEventListener('click', () => {
                currentReelId = reel.id;
                let savedComments = localStorage.getItem(`comments_${reel.id}`);
                currentCommentsArray = savedComments ? JSON.parse(savedComments) : (reel.comments || []);
                renderGlobalComments();
                document.getElementById('globalCommentSheet').classList.add('open');
            });

            const openProfile = () => {
                document.getElementById('pViewUsername').innerText = `@${reel.username}`;
                document.getElementById('pViewPic').src = reel.profile_pic || 'https://via.placeholder.com/80';
                document.getElementById('pViewBio').innerText = reel.bio || 'No bio available';
                
                const gridContainer = document.getElementById('pViewGrid');
                gridContainer.innerHTML = '';
                if (reel.posts && reel.posts.length > 0) {
                    reel.posts.forEach(postUrl => {
                        const img = document.createElement('img');
                        img.className = 'grid-post-img';
                        img.src = postUrl;
                        gridContainer.appendChild(img);
                    });
                } else {
                    gridContainer.innerHTML = '<p style="color:#777; grid-column: span 3; text-align:center; padding: 20px;">No posts yet</p>';
                }

                if (currentPlayingVideo) currentPlayingVideo.pause();
                document.getElementById('globalProfileView').classList.add('open');
            };

            profilePic.addEventListener('click', openProfile);
            usernameText.addEventListener('click', openProfile);

            let tapTimer = null;
            video.addEventListener('click', () => {
                if (!tapTimer) {
                    tapTimer = setTimeout(() => {
                        if (video.paused) {
                            video.play().catch(err => console.log(err));
                        } else {
                            video.pause();
                        }
                        tapTimer = null;
                    }, 250);
                } else {
                    clearTimeout(tapTimer);
                    tapTimer = null;
                    heart.classList.add('animate');
                    triggerLike(true);
                    setTimeout(() => heart.classList.remove('animate'), 700);
                }
            });
        }

        function renderGlobalComments() {
            const listContainer = document.getElementById('globalCommentsList');
            let commentsHTML = '';
            currentCommentsArray.forEach(c => {
                commentsHTML += `<div class="comment-item"><span class="comment-user">@${c.username}</span><span class="comment-text">${c.text}</span></div>`;
            });
            listContainer.innerHTML = commentsHTML || '<p class="no-comments" style="color:#777;">No comments yet</p>';
            listContainer.scrollTop = listContainer.scrollHeight;
        }

        function setupGlobalCommentSheet() {
            const sheet = document.getElementById('globalCommentSheet');
            document.getElementById('globalCloseBtn').addEventListener('click', () => sheet.classList.remove('open'));

            const submitComment = () => {
                const inputBox = document.getElementById('globalCommentInput');
                const commentText = inputBox.value.trim();
                if (commentText === '' || currentReelId === null) return;

                const commentsList = document.getElementById('globalCommentsList');
                const noCommentsText = commentsList.querySelector('.no-comments');
                if (noCommentsText) noCommentsText.remove();

                const newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.innerHTML = `<span class="comment-user">@you</span><span class="comment-text">${commentText}</span>`;
                commentsList.appendChild(newComment);

                currentCommentsArray.push({ username: 'you', text: commentText });
                localStorage.setItem(`comments_${currentReelId}`, JSON.stringify(currentCommentsArray));

                inputBox.value = '';
                commentsList.scrollTop = commentsList.scrollHeight;
            };

            document.getElementById('globalPostBtn').addEventListener('click', submitComment);
            document.getElementById('globalCommentInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitComment();
            });
        }

        function setupGlobalProfileView() {
            document.getElementById('profileCloseBtn').addEventListener('click', () => {
                document.getElementById('globalProfileView').classList.remove('open');
                if (currentPlayingVideo) {
                    currentPlayingVideo.play().catch(e => console.log(e));
                }
            });
        }

        // Updated 3-Way Switching Bottom Navigation 🗺️
        function setupBottomNavigation() {
            const homeBtn = document.getElementById('navHome');
            const searchBtn = document.getElementById('navSearch');
            const profileBtn = document.getElementById('navProfile');

            const reelsCont = document.getElementById('reelsContainer');
            const myProfileCont = document.getElementById('myProfileView');
            const searchViewCont = document.getElementById('searchView');

            homeBtn.addEventListener('click', () => {
                setActiveNav(homeBtn);
                reelsCont.style.display = 'block';
                myProfileCont.style.display = 'none';
                searchViewCont.style.display = 'none';
                if (currentPlayingVideo) currentPlayingVideo.play().catch(e => console.log(e));
            });

            searchBtn.addEventListener('click', () => {
                setActiveNav(searchBtn);
                reelsCont.style.display = 'none';
                myProfileCont.style.display = 'none';
                searchViewCont.style.display = 'block';
                if (currentPlayingVideo) currentPlayingVideo.pause();
            });

            profileBtn.addEventListener('click', () => {
                setActiveNav(profileBtn);
                reelsCont.style.display = 'none';
                myProfileCont.style.display = 'block';
                searchViewCont.style.display = 'none';
                if (currentPlayingVideo) currentPlayingVideo.pause();
            });
        }

        function setActiveNav(activeButton) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            activeButton.classList.add('active');
        }

        function setupReelController() {
            const videos = document.querySelectorAll('.reel-video');
            const commentSheet = document.getElementById('globalCommentSheet');
            const profileSheet = document.getElementById('globalProfileView');
            const myProfileCont = document.getElementById('myProfileView');
            const searchViewCont = document.getElementById('searchView');

            const unmuteAll = () => {
                videos.forEach(v => v.muted = false);
                document.removeEventListener('click', unmuteAll);
                document.removeEventListener('touchstart', unmuteAll);
            };
            document.addEventListener('click', unmuteAll);
            document.addEventListener('touchstart', unmuteAll);

            const observerOptions = { root: container, threshold: 0.6 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        currentPlayingVideo = video;
                        // Video tab active hone par hi auto-play chale
                        if (!profileSheet.classList.contains('open') && myProfileCont.style.display !== 'block' && searchViewCont.style.display !== 'block') {
                            video.play().catch(err => console.log("Autoplay waiting"));
                        }
                    } else {
                        video.pause();
                        commentSheet.classList.remove('open');
                    }
                });
            }, observerOptions);

            videos.forEach(video => observer.observe(video));
        }

        loadReels();
    </script>

</body>

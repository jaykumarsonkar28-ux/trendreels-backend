<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Right Side Buttons Container ↕️ */
        .reels-buttons {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        /* Individual Button Style 🔘 */
        .action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .action-btn:active {
            transform: scale(0.9);
        }

        /* Title Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 40px;
            left: 20px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .reel-title {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer"></div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json';
        const container = document.getElementById('reelsContainer');

        // Sequence ko sahi rakhne ke liye ek async function 🔄
        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                // for...of loop jo ek-ek karke sahi order mein data load karega 1️⃣➡️2️⃣➡️3️⃣
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop autoplay muted playsinline></video>
                        
                        <!-- Side Buttons -->
                        <div class="reels-buttons">
                            <button class="action-btn" onclick="toggleLike(this)">🤍</button>
                            <button class="action-btn" onclick="toggleMute(this)">🔇</button>
                        </div>

                        <!-- Text Overlay -->
                        <div class="reel-overlay">
                            <div class="reel-title">${reel.title}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        // Function ko chalayein
        loadReels();

        // Like Button Logic ❤️
        function toggleLike(button) {
            if (button.innerText === '🤍') {
                button.innerText = '❤️';
            } else {
                button.innerText = '🤍';
            }
        }

        // Mute/Unmute Logic 🔊
        function toggleMute(button) {
            const video = button.closest('.reel-card').querySelector('.reel-video');
            if (video.muted) {
                video.muted = false;
                button.innerText = '🔊';
            } else {
                video.muted = true;
                button.innerText = '🔇';
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Reels Container for vertical magnetic scroll 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Title Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 40px;
            left: 20px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .reel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- Main container jahan videos automatic load hongi -->
    <div class="reels-container" id="reelsContainer"></div>

    <script>
        // 1. reels.json file se data fetch karne ka link 🌐
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json';
        const container = document.getElementById('reelsContainer');

        // 2. Data load karne ka function 🔄
        fetch(jsonUrl)
            .then(response => response.json())
            .then(data => {
                // Loop chalakar har ek reel ko HTML mein add karna
                data.forEach(reel => {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop autoplay muted playsinline></video>
                        <div class="reel-overlay">
                            <div class="reel-title">${reel.title}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => console.error('Data load karne mein dikkat aayi:', error));
    </script>

</body>
</html>

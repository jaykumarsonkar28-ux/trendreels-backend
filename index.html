<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Profile aur Caption Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 80px; /* Buttons ke liye jagah chhodi hai */
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* User Profile Section (Photo + Name) 👤 */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }
        .username {
            font-size: 16px;
            font-weight: bold;
        }

        /* Caption Style 📜 */
        .reel-caption {
            font-size: 14px;
            color: #e6e6e6;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer"></div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json?v=' + new Date().getTime();
        const container = document.getElementById('reelsContainer');

        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    
                    // HTML mein Profile Picture, Username aur Caption joda gaya hai 🖼️
                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop muted playsinline></video>
                        <div class="reel-overlay">
                            <div class="profile-section">
                                <img class="profile-pic" src="${reel.profile_pic}" alt="profile">
                                <span class="username">@${reel.username}</span>
                            </div>
                            <div class="reel-caption">${reel.caption}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }

                setupReelController();

            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        function setupReelController() {
            const videos = document.querySelectorAll('.reel-video');

            // Screen touch karte hi unmute karne ke liye
            document.body.addEventListener('click', () => {
                videos.forEach(video => {
                    video.muted = false;
                });
            }, { once: true });

            // Intersection Observer scroll control ke liye
            const observerOptions = {
                root: container,
                threshold: 0.6
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(err => console.log("Autoplay waiting"));
                    } else {
                        video.pause();
                    }
                });
            }, observerOptions);

            videos.forEach(video => observer.observe(video));
        }

        loadReels();
    </script>

</body>
</html>

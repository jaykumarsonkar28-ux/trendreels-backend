<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Title Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 40px;
            left: 20px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .reel-title {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer"></div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json?v=' + new Date().getTime();
        const container = document.getElementById('reelsContainer');

        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    
                    // 1. Shuruat mein 'muted' rakhna zaroori hai browser policy ke liye
                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop muted playsinline></video>
                        <div class="reel-overlay">
                            <div class="reel-title">${reel.title}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }

                // Reels load hone ke baad auto-play aur sound handle karenge
                setupReelController();

            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        function setupReelController() {
            const videos = document.querySelectorAll('.reel-video');

            // 2. Global Unmute: Screen par kahi bhi touch/click karte hi saare videos unmute ho jayenge
            document.body.addEventListener('click', () => {
                videos.forEach(video => {
                    video.muted = false;
                });
            }, { once: true }); // '{ once: true }' se yeh event sirf pehli click par chalega

            // 3. Intersection Observer: Jo reel screen par dikhegi sirf wahi chalegi
            const observerOptions = {
                root: container,
                threshold: 0.6 // Jab 60% video dikhegi tabhi play hogi
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(err => console.log("Autoplay waiting for user interaction"));
                    } else {
                        video.pause();
                    }
                });
            }, observerOptions);

            // Saare videos ko observer mein add karein
            videos.forEach(video => observer.observe(video));
        }

        loadReels();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels Test App</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
        button { background: #E50914; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; }
        #status { margin-top: 20px; font-size: 16px; color: #00FF00; }
    </style>
</head>
<body>

    <h1>TrendReels Test 🎬</h1>
    <p>Kya hamara mobile app frontend backend se connect ho pa raha hai?</p>
    
    <!-- Yeh button click karne par backend ko call karega -->
    <button onclick="testBackend()">Connect to Backend</button>
    
    <div id="status"></div>

    <script>
        async function testBackend() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Connecting...";
            
            try {
                // Aapka Render Backend URL
                const response = await fetch('https://trendreels-backend-1.onrender.com');
                if(response.ok) {
                    statusDiv.innerText = "Success! Backend se connection pakka ho gaya. 🎉";
                } else {
                    statusDiv.innerText = "Backend mil gaya, par kuch error hai.";
                }
            } catch (error) {
                statusDiv.innerText = "Connection failed! Backend abhi so raha hai ya URL galat hai.";
                console.error(error);
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            padding-bottom: 60px;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Progress Bar Container 🎞️ */
        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 20;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #3897f0;
        }

        /* Right Side Buttons Container ↕️ */
        .reels-buttons {
            position: absolute;
            right: 15px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 12;
        }

        /* Individual Button Style 🔘 */
        .action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        .action-btn:active {
            transform: scale(0.9);
        }

        /* Profile aur Caption Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 80px;
            left: 15px;
            right: 80px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            pointer-events: auto;
        }
        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
            cursor: pointer;
        }
        .username {
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Follow Button Style 👥 */
        .follow-btn {
            background: #3897f0;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .follow-btn.following {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .reel-caption {
            font-size: 14px;
            color: #e6e6e6;
            pointer-events: auto;
        }

        /* Big Heart Animation Popup ❤️ */
        .heart-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 90px;
            z-index: 11;
            pointer-events: none;
            opacity: 0;
        }
        .heart-popup.animate {
            animation: heartPopEffect 0.7s ease-in-out forwards;
        }
        @keyframes heartPopEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* Global Comment Sheet 📋 */
        .comment-sheet {
            position: fixed;
            bottom: -60vh;
            left: 0;
            width: 100%;
            height: 55vh;
            background: #1a1a1a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 100;
            transition: bottom 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .comment-sheet.open {
            bottom: 0;
        }
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .comments-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .comment-item {
            margin-bottom: 12px;
            font-size: 14px;
        }
        .comment-user {
            font-weight: bold;
            color: #3897f0;
            margin-right: 5px;
        }
        .comment-input-area {
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
            background: #1a1a1a;
        }
        .new-comment-box {
            flex: 1;
            background: #262626;
            border: 1px solid #363636;
            border-radius: 20px;
            color: #fff;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .post-comment-btn {
            background: none;
            border: none;
            color: #3897f0;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        /* Creator Profile View Layout 👤 */
        .profile-view {
            position: fixed;
            top: 100vh;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 200;
            transition: top 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            padding: 20px;
            overflow-y: auto;
        }
        .profile-view.open {
            top: 0;
        }
        .profile-header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .profile-view-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-view-username {
            font-size: 20px;
            font-weight: bold;
        }
        .profile-view-bio {
            font-size: 14px;
            color: #ccc;
        }

        /* Personal Profile Screen Style 👤 */
        .my-profile-container {
            width: 100%;
            height: 100vh;
            background: #000;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }
        .stat-item num {
            font-size: 18px;
            font-weight: bold;
            display: block;
        }
        .stat-item txt {
            font-size: 12px;
            color: #aaa;
        }

        /* Search View Container Style 🔍 */
        .search-view-container {
            width: 100%;
            height: 100vh;
            background: #000;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        .search-bar-box {
            width: 100%;
            background: #262626;
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 10px 15px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }
        
        /* 3-Column Grid Post System 📊 */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-top: 10px;
        }
        .grid-post-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #222;
        }

        /* Edit Profile Form Design 📝 */
        .edit-profile-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 260;
            padding: 20px;
            display: none;
            overflow-y: auto;
        }
        .form-group-item {
            margin-bottom: 20px;
        }
        .form-group-item label {
            display: block;
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 6px;
        }
        .form-input-element {
            width: 100%;
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }
        textarea.form-input-element {
            height: 90px;
            resize: none;
        }

        /* Custom Toast Notification Style 🍞 */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(26, 26, 26, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Bottom Navigation Bar Styles 🗺️ */
        .bottom-nav {
            position: fixed;
            bottom: 15px; 
            left: 0;
            width: 100%;
            height: 60px;
            background: #000;
            border-top: 1px solid #262626;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 250;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.1s;
        }
        .nav-btn.active {
            opacity: 1;
        }
        .nav-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    </div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json?v=' + new Date().getTime();
        const container = document.getElementById('reelsContainer');
        
        let currentReelId = null;
        let currentCommentsArray = [];
        let currentPlayingVideo = null; 
        let globalReelsData = []; // 🔍 Search ke liye data hold karne ka store

        // 📋 Fallback mock data agar JSON me liked_by na mile
        const mockLikes = [
            { username: 'royal_sonkar', name: 'ROYAL SONKAR', pic: 'https://picsum.photos/id/1011/40/40' },
            { username: 'aartisonkar884', name: 'aarti sonkar', pic: 'https://picsum.photos/id/1012/40/40' },
            { username: 'itsme_yogesh', name: 'YOGESH SINHA', pic: 'https://picsum.photos/id/1013/40/40' }
        ];

        function showToast(message) {
            const toast = document.getElementById('toastBox');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                globalReelsData = data; // 🔍 Array data store kiya
                
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    card.dataset.id = reel.id;
                    
                    let isLiked = localStorage.getItem(`like_${reel.id}`) === 'true';
                    let likeIcon = isLiked ? '❤️' : '🤍';

                    let savedFollow = localStorage.getItem(`follow_${reel.username}`);
                    let currentFollowText = savedFollow ? savedFollow : (reel.follow_status || 'Follow');
                    let followClass = currentFollowText === 'Following' ? 'follow-btn following' : 'follow-btn';

                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop muted playsinline></video>
                        <div class="heart-popup">❤️</div>
                        
                        <!-- 🎞️ Video Progress Bar HTML -->
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill"></div>
                        </div>

                        <div class="reels-buttons">
                            <button class="action-btn like-btn">${likeIcon}</button>
                            <span class="likes-count-trigger" style="font-size: 12px; text-align: center; margin-top: -15px; margin-bottom: 15px; cursor: pointer; font-weight: bold;">29,524</span>
                            <button class="action-btn comment-btn">💬</button>
                            <button class="action-btn share-btn">🔗</button>
                        </div>

                        <div class="reel-overlay">
                            <div class="profile-section">
                                <img class="profile-pic" src="${reel.profile_pic || 'https://via.placeholder.com/35'}" alt="profile">
                                <span class="username">@${reel.username}</span>
                                <button class="${followClass}">${currentFollowText}</button>
                            </div>
                            <div class="reel-caption">${reel.caption}</div>
                        </div>
                    `;
                    
                    bindReelEvents(card, reel);
                    container.appendChild(card);
                }

                setupReelController();
                setupGlobalCommentSheet();
                setupGlobalLikesSheet(); 
                setupGlobalProfileView();
                setupBottomNavigation();
                setupEditProfileSystem();
                setupSearchSystem(); // 🔍 Search event listener setup
                loadProfileData();

            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        function openGlobalProfile(username, profilePic, bio, posts) {
            document.getElementById('pViewUsername').innerText = `@${username}`;
            document.getElementById('pViewPic').src = profilePic || 'https://via.placeholder.com/80';
            document.getElementById('pViewBio').innerText = bio || 'No bio available';
            
            const gridContainer = document.getElementById('pViewGrid');
            gridContainer.innerHTML = '';
            
            if (posts && posts.length > 0) {
                posts.forEach(postUrl => {
                    const img = document.createElement('img');
                    img.className = 'grid-post-img';
                    img.src = postUrl;
                    gridContainer.appendChild(img);
                });
            } else {
                gridContainer.innerHTML = '<p style="color:#777; grid-column: span 3; text-align:center; padding: 20px;">No posts yet</p>';
            }

            if (currentPlayingVideo) currentPlayingVideo.pause();
            document.getElementById('globalProfileView').classList.add('open');
        }

        function bindReelEvents(card, reel) {
            const video = card.querySelector('.reel-video');
            const heart = card.querySelector('.heart-popup');
            const likeBtn = card.querySelector('.like-btn');
            const commentBtn = card.querySelector('.comment-btn');
            const shareBtn = card.querySelector('.share-btn');
            const followBtn = card.querySelector('.follow-btn');
            const profilePic = card.querySelector('.profile-pic');
            const usernameText = card.querySelector('.username');
            const likesCountBtn = card.querySelector('.likes-count-trigger'); 
            const progressBarFill = card.querySelector('.progress-bar-fill'); // 🎞️ Bar fill tracker

            // 🎞️ Progress Bar Logic
            video.addEventListener('timeupdate', () => {
                if (video.duration) {
                    const progressPercentage = (video.currentTime / video.duration) * 100;
                    progressBarFill.style.width = `${progressPercentage}%`;
                }
            });

            let isLiked = localStorage.getItem(`like_${reel.id}`) === 'true';
            let baseLikes = 29524; 
            let currentLikes = isLiked ? baseLikes + 1 : baseLikes;
            likesCountBtn.innerText = currentLikes.toLocaleString();

            const triggerLike = (forceLike = false) => {
                let currentlyLiked = likeBtn.innerText === '❤️';
                if (forceLike) currentlyLiked = false;

                if (!currentlyLiked) {
                    likeBtn.innerText = '❤️';
                    localStorage.setItem(`like_${reel.id}`, 'true');
                    currentLikes++; 
                } else {
                    likeBtn.innerText = '🤍';
                    localStorage.setItem(`like_${reel.id}`, 'false');
                    currentLikes--; 
                }
                likesCountBtn.innerText = currentLikes.toLocaleString();
            };
            likeBtn.addEventListener('click', () => triggerLike());

            likesCountBtn.addEventListener('click', () => {
                const likesSheet = document.getElementById('globalLikesSheet');
                const likesList = document.getElementById('globalLikesList');
                // 🔄 Dynamic Data: reel.liked_by pass kiya, nahi toh fallback chalega
                renderLikesList(likesList, reel.liked_by || mockLikes);
                likesSheet.classList.add('open');
            });

            followBtn.addEventListener('click', () => {
                if (followBtn.innerText === 'Follow') {
                    followBtn.innerText = 'Following';
                    followBtn.classList.add('following');
                    localStorage.setItem(`follow_${reel.username}`, 'following');
                } else {
                    followBtn.innerText = 'Follow';
                    followBtn.classList.remove('following');
                    localStorage.setItem(`follow_${reel.username}`, 'Follow');
                }
            });

            shareBtn.addEventListener('click', async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: reel.title || 'TrendReels Video',
                            text: reel.caption,
                            url: reel.video_url
                        });
                    } catch (err) {
                        console.log("Share cancelled");
                    }
                } else {
                    navigator.clipboard.writeText(reel.video_url);
                    showToast("Video link copied to clipboard! 🔗");
                }
            });

            commentBtn.addEventListener('click', () => {
                currentReelId = reel.id;
                let savedComments = localStorage.getItem(`comments_${reel.id}`);
                currentCommentsArray = savedComments ? JSON.parse(savedComments) : (reel.comments || []);
                renderGlobalComments();
                document.getElementById('globalCommentSheet').classList.add('open');
            });

            profilePic.addEventListener('click', () => openGlobalProfile(reel.username, reel.profile_pic, reel.bio, reel.posts));
            usernameText.addEventListener('click', () => openGlobalProfile(reel.username, reel.profile_pic, reel.bio, reel.posts));

            let tapTimer = null;
            video.addEventListener('click', () => {
                if (!tapTimer) {
                    tapTimer = setTimeout(() => {
                        if (video.paused) {
                            video.play().catch(err => console.log(err));
                        } else {
                            video.pause();
                        }
                        tapTimer = null;
                    }, 250);
                } else {
                    clearTimeout(tapTimer);
                    tapTimer = null;
                    heart.classList.add('animate');
                    triggerLike(true);
                    setTimeout(() => heart.classList.remove('animate'), 700);
                }
            });
        }

        function renderGlobalComments() {
            const listContainer = document.getElementById('globalCommentsList');
            let commentsHTML = '';
            currentCommentsArray.forEach(c => {
                commentsHTML += `<div class="comment-item"><span class="comment-user">@${c.username}</span><span class="comment-text">${c.text}</span></div>`;
            });
            listContainer.innerHTML = commentsHTML || '<p class="no-comments" style="color:#777;">No comments yet</p>';
            listContainer.scrollTop = listContainer.scrollHeight;
        }

        // 🔄 Dynamic Likes List render function
        function renderLikesList(container, likedByData) {
            container.innerHTML = ''; 
            likedByData.forEach(user => {
                let savedFollow = localStorage.getItem(`follow_${user.username}`);
                let currentFollowText = savedFollow === 'following' ? 'Following' : 'Follow';
                
                let btnStyle = currentFollowText === 'Following' 
                    ? "background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); color: #fff;" 
                    : "background: #3897f0; color: #fff; border: none;";

                container.innerHTML += `
                    <div class="comment-item" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;" data-username="${user.username}">
                        <div style="display: flex; align-items: center; gap: 10px; cursor: pointer;" class="user-info-trigger">
                            <img src="${user.pic}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                            <div>
                                <span class="comment-user" style="color:#fff;">@${user.username}</span>
                                <div style="color: #aaa; font-size: 12px;">${user.name}</div>
                            </div>
                        </div>
                        <button class="follow-btn" style="${btnStyle} padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer;">${currentFollowText}</button>
                    </div>
                `;
            });
        }

        // 🔍 Working Search Bar System Logic
        function setupSearchSystem() {
            const searchInput = document.getElementById('searchInputField');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const gridArea = document.getElementById('exploreGridArea');
                
                if (query === '') {
                    gridArea.innerHTML = `
                        <img class="grid-post-img" src="https://picsum.photos/id/11/200/200" alt="explore">
                        <img class="grid-post-img" src="https://picsum.photos/id/12/200/200" alt="explore">
                        <img class="grid-post-img" src="https://picsum.photos/id/13/200/200" alt="explore">
                    `;
                    return;
                }

                // 🔄 Filter backend loaded creators
                const matchedCreators = globalReelsData.filter(reel => 
                    reel.username.toLowerCase().includes(query)
                );

                if (matchedCreators.length > 0) {
                    gridArea.innerHTML = '';
                    matchedCreators.forEach(creator => {
                        const div = document.createElement('div');
                        div.style.cssText = "background:#111; padding:15px; border-radius:8px; text-align:center; cursor:pointer; border:1px solid #222;";
                        div.innerHTML = `
                            <img src="${creator.profile_pic || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; border-radius:50%; object-fit:cover; margin-bottom:8px;">
                            <div style="font-weight:bold; font-size:14px;">@${creator.username}</div>
                        `;
                        div.addEventListener('click', () => {
                            openGlobalProfile(creator.username, creator.profile_pic, creator.bio, creator.posts);
                        });
                        gridArea.appendChild(div);
                    });
                } else {
                    gridArea.innerHTML = `<p style="color:#666; grid-column: span 3; text-align:center; padding:4px;">No creators found matching "${query}"</p>`;
                }
            });
        }

        function setupGlobalCommentSheet() {
            const sheet = document.getElementById('globalCommentSheet');
            document.getElementById('globalCloseBtn').addEventListener('click', () => sheet.classList.remove('open'));

            const submitComment = () => {
                const inputBox = document.getElementById('globalCommentInput');
                const commentText = inputBox.value.trim();
                if (commentText === '' || currentReelId === null) return;

                const commentsList = document.getElementById('globalCommentsList');
                const noCommentsText = commentsList.querySelector('.no-comments');
                if (noCommentsText) noCommentsText.remove();

                const newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.innerHTML = `<span class="comment-user">@you</span><span class="comment-text">${commentText}</span>`;
                commentsList.appendChild(newComment);

                currentCommentsArray.push({ username: 'you', text: commentText });
                localStorage.setItem(`comments_${currentReelId}`, JSON.stringify(currentCommentsArray));

                inputBox.value = '';
                commentsList.scrollTop = commentsList.scrollHeight;
            };

            document.getElementById('globalPostBtn').addEventListener('click', submitComment);
            document.getElementById('globalCommentInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitComment();
            });
        }

        function setupGlobalLikesSheet() {
            const likesSheet = document.getElementById('globalLikesSheet');
            const closeBtn = document.getElementById('likesCloseBtn');
            const likesList = document.getElementById('globalLikesList');

            closeBtn.addEventListener('click', () => {
                likesSheet.classList.remove('open');
            });

            likesList.addEventListener('click', (e) => {
                if (e.target.classList.contains('follow-btn')) {
                    const btn = e.target;
                    const parent = btn.closest('.comment-item');
                    const username = parent.dataset.username;

                    if (btn.innerText === 'Follow') {
                        btn.innerText = 'Following';
                        btn.style.background = 'rgba(255, 255, 255, 0.2)';
                        btn.style.border = '1px solid rgba(255, 255, 255, 0.4)';
                        localStorage.setItem(`follow_${username}`, 'following');
                    } else {
                        btn.innerText = 'Follow';
                        btn.style.background = '#3897f0';
                        btn.style.border = 'none';
                        localStorage.setItem(`follow_${username}`, 'Follow');
                    }
                    return;
                }

                const triggerRow = e.target.closest('.user-info-trigger');
                if (triggerRow) {
                    const parent = triggerRow.closest('.comment-item');
                    const username = parent.dataset.username;
                    
                    // JSON or Fallback matching array data extraction
                    const currentListItems = Array.from(likesList.children).map(el => el.dataset.username);
                    const targetUser = mockLikes.find(u => u.username === username);
                    if (targetUser) {
                        likesSheet.classList.remove('open');
                        openGlobalProfile(targetUser.username, targetUser.pic, `Hey! I am ${targetUser.name}. Content Creator on TrendReels 🚀`, []);
                    }
                }
            });
        }

        function setupGlobalProfileView() {
            document.getElementById('profileCloseBtn').addEventListener('click', () => {
                document.getElementById('globalProfileView').classList.remove('open');
                if (currentPlayingVideo) {
                    currentPlayingVideo.play().catch(e => console.log(e));
                }
            });
        }

        function loadProfileData() {
            let savedName = localStorage.getItem('profileName');
            if (savedName) {
                document.getElementById('myFullNameDisplay').innerText = savedName;
            }

            let savedUsername = localStorage.getItem('profileUsername');
            if (savedUsername) {
                document.getElementById('myUsernameHeader').innerText = `@${savedUsername}`;
            }

            let savedBio = localStorage.getItem('profileBio');
            if (savedBio) {
                document.getElementById('myFullNameDisplay').nextElementSibling.innerText = savedBio;
            }
        }

        function setupEditProfileSystem() {
            const panel = document.getElementById('editProfileView');
            const triggerBtn = document.getElementById('myEditProfileTrigger');
            const cancelBtn = document.getElementById('cancelEditFormBtn');
            const saveBtn = document.getElementById('saveEditFormBtn');

            const headerUsername = document.getElementById('myUsernameHeader');
            const displayFullName = document.getElementById('myFullNameDisplay');
            const displayBio = displayFullName.nextElementSibling;

            const nameInput = document.getElementById('inputEditName');
            const usernameInput = document.getElementById('inputEditUsername');
            const bioInput = document.getElementById('inputEditBio');

            triggerBtn.addEventListener('click', () => {
                nameInput.value = displayFullName.innerText;
                usernameInput.value = headerUsername.innerText.replace('@', '');
                bioInput.value = displayBio.innerText;
                panel.style.display = 'block';
            });

            cancelBtn.addEventListener('click', () => {
                panel.style.display = 'none';
            });

            saveBtn.addEventListener('click', () => {
                const filledName = nameInput.value.trim();
                const filledUsername = usernameInput.value.trim();
                const filledBio = bioInput.value.trim();

                if (filledName !== "") displayFullName.innerText = filledName;
                if (filledUsername !== "") headerUsername.innerText = `@${filledUsername}`;
                displayBio.innerText = filledBio;

                localStorage.setItem('profileName', filledName);
                localStorage.setItem('profileUsername', filledUsername);
                localStorage.setItem('profileBio', filledBio);

                panel.style.display = 'none';
                showToast("Profile updated! ✨");
            });
        }

        function setupBottomNavigation() {
            const homeBtn = document.getElementById('navHome');
            const searchBtn = document.getElementById('navSearch');
            const profileBtn = document.getElementById('navProfile');

            const reelsCont = document.getElementById('reelsContainer');
            const searchCont = document.getElementById('searchView');
            const profileCont = document.getElementById('myProfileView');

            function resetActiveTabs() {
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                reelsCont.style.display = 'none';
                searchCont.style.display = 'none';
                profileCont.style.display = 'none';
                document.getElementById('globalCommentSheet').classList.remove('open');
                document.getElementById('globalLikesSheet').classList.remove('open'); 
                document.getElementById('globalProfileView').classList.remove('open');
                document.getElementById('editProfileView').style.display = 'none';
            }

            homeBtn.addEventListener('click', () => {
                resetActiveTabs();
                homeBtn.classList.add('active');
                reelsCont.style.display = 'block';
                if (currentPlayingVideo) currentPlayingVideo.play().catch(e => console.log(e));
            });

            searchBtn.addEventListener('click', () => {
                resetActiveTabs();
                searchBtn.classList.add('active');
                searchCont.style.display = 'block';
                if (currentPlayingVideo) currentPlayingVideo.pause();
            });

            profileBtn.addEventListener('click', () => {
                resetActiveTabs();
                profileBtn.classList.add('active');
                profileCont.style.display = 'block';
                if (currentPlayingVideo) currentPlayingVideo.pause();
            });
        }

        function setupReelController() {
            const videos = document.querySelectorAll('.reel-video');
            const commentSheet = document.getElementById('globalCommentSheet');
            const likesSheet = document.getElementById('globalLikesSheet');
            const profileSheet = document.getElementById('globalProfileView');

            const unmuteAll = () => {
                videos.forEach(v => v.muted = false);
                document.removeEventListener('click', unmuteAll);
                document.removeEventListener('touchstart', unmuteAll);
            };
            document.addEventListener('click', unmuteAll);
            document.addEventListener('touchstart', unmuteAll);

            const observerOptions = { root: container, threshold: 0.6 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        currentPlayingVideo = video; 
                        if (!profileSheet.classList.contains('open') && document.getElementById('reelsContainer').style.display !== 'none') {
                            video.play().catch(err => console.log("Autoplay waiting"));
                        }
                    } else {
                        video.pause();
                        commentSheet.classList.remove('open');
                        likesSheet.classList.remove('open'); 
                    }
                });
            }, observerOptions);

            videos.forEach(video => observer.observe(video));
        }

        loadReels();
    </script>

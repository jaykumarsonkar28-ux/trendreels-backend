<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Right Side Buttons Container ↕️ */
        .reels-buttons {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 12;
        }

        /* Individual Button Style 🔘 */
        .action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        .action-btn:active {
            transform: scale(0.9);
        }

        /* Profile aur Caption Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 80px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }
        .username {
            font-size: 16px;
            font-weight: bold;
        }
        .reel-caption {
            font-size: 14px;
            color: #e6e6e6;
        }

        /* Big Heart Animation Popup ❤️ */
        .heart-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 90px;
            z-index: 11;
            pointer-events: none;
            opacity: 0;
        }
        .heart-popup.animate {
            animation: heartPopEffect 0.7s ease-in-out forwards;
        }
        @keyframes heartPopEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* Comment Bottom Sheet 📋 */
        .comment-sheet {
            position: absolute;
            bottom: -60vh;
            left: 0;
            width: 100%;
            height: 55vh;
            background: #1a1a1a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 20;
            transition: bottom 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .comment-sheet.open {
            bottom: 0;
        }
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .comments-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .comment-item {
            margin-bottom: 12px;
            font-size: 14px;
        }
        .comment-user {
            font-weight: bold;
            color: #3897f0;
            margin-right: 5px;
        }

        /* Comment Input Area Style 📝 */
        .comment-input-area {
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
            background: #1a1a1a;
        }
        .new-comment-box {
            flex: 1;
            background: #262626;
            border: 1px solid #363636;
            border-radius: 20px;
            color: #fff;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .post-comment-btn {
            background: none;
            border: none;
            color: #3897f0;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer"></div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json?v=' + new Date().getTime();
        const container = document.getElementById('reelsContainer');

        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    
                    // 1. LocalStorage se pehle se saved comments nikalna 📤
                    let savedComments = localStorage.getItem(`comments_${reel.id}`);
                    let commentsArray = savedComments ? JSON.parse(savedComments) : (reel.comments || []);
                    
                    let commentsHTML = '';
                    commentsArray.forEach(c => {
                        commentsHTML += `
                            <div class="comment-item">
                                <span class="comment-user">@${c.username}</span>
                                <span class="comment-text">${c.text}</span>
                            </div>`;
                    });

                    // 2. LocalStorage se Like ka status check karna ❤️
                    let isLiked = localStorage.getItem(`like_${reel.id}`) === 'true';
                    let likeIcon = isLiked ? '❤️' : '🤍';

                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop muted playsinline></video>
                        <div class="heart-popup">❤️</div>
                        
                        <div class="reels-buttons">
                            <button class="action-btn like-btn">${likeIcon}</button>
                            <button class="action-btn comment-btn">💬</button>
                        </div>

                        <div class="reel-overlay">
                            <div class="profile-section">
                                <img class="profile-pic" src="${reel.profile_pic || 'https://via.placeholder.com/35'}" alt="profile">
                                <span class="username">@${reel.username}</span>
                            </div>
                            <div class="reel-caption">${reel.caption}</div>
                        </div>

                        <div class="comment-sheet">
                            <div class="sheet-header">
                                <h3>Comments</h3>
                                <button class="close-btn">✕</button>
                            </div>
                            <div class="comments-list">${commentsHTML || '<p class="no-comments" style="color:#777;">No comments yet</p>'}</div>
                            
                            <div class="comment-input-area">
                                <input type="text" class="new-comment-box" placeholder="Add a comment...">
                                <button class="post-comment-btn">Post</button>
                            </div>
                        </div>
                    `;
                    
                    bindReelEvents(card, reel.id, commentsArray);
                    container.appendChild(card);
                }

                setupReelController();

            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        function bindReelEvents(card, reelId, commentsArray) {
            const video = card.querySelector('.reel-video');
            const heart = card.querySelector('.heart-popup');
            const likeBtn = card.querySelector('.like-btn');
            const commentBtn = card.querySelector('.comment-btn');
            const closeBtn = card.querySelector('.close-btn');
            const sheet = card.querySelector('.comment-sheet');
            const postBtn = card.querySelector('.post-comment-btn');
            const inputBox = card.querySelector('.new-comment-box');
            const commentsList = card.querySelector('.comments-list');

            // Like status toggle aur save karna 📥
            const triggerLike = (forceLike = false) => {
                let currentlyLiked = likeBtn.innerText === '❤️';
                if (forceLike) currentlyLiked = false; // Double tap hamesha like karega

                if (!currentlyLiked) {
                    likeBtn.innerText = '❤️';
                    localStorage.setItem(`like_${reelId}`, 'true');
                } else {
                    likeBtn.innerText = '🤍';
                    localStorage.setItem(`like_${reelId}`, 'false');
                }
            };

            likeBtn.addEventListener('click', () => triggerLike());

            commentBtn.addEventListener('click', () => sheet.classList.add('open'));
            closeBtn.addEventListener('click', () => sheet.classList.remove('open'));

            // New comment ko array mein add karke LocalStorage mein save karna 📥
            const submitComment = () => {
                const commentText = inputBox.value.trim();
                if (commentText === '') return;

                const noCommentsText = commentsList.querySelector('.no-comments');
                if (noCommentsText) noCommentsText.remove();

                // Naye comment ko screen par jodhna
                const newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.innerHTML = `<span class="comment-user">@you</span><span class="comment-text">${commentText}</span>`;
                commentsList.appendChild(newComment);

                // LocalStorage data update logic
                commentsArray.push({ username: 'you', text: commentText });
                localStorage.setItem(`comments_${reelId}`, JSON.stringify(commentsArray));

                inputBox.value = '';
                commentsList.scrollTop = commentsList.scrollHeight;
            };

            postBtn.addEventListener('click', submitComment);
            inputBox.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitComment();
            });

            // Tap manager logic
            let tapTimer = null;
            video.addEventListener('click', () => {
                if (!tapTimer) {
                    tapTimer = setTimeout(() => {
                        if (video.paused) {
                            video.play().catch(err => console.log(err));
                        } else {
                            video.pause();
                        }
                        tapTimer = null;
                    }, 250);
                } else {
                    clearTimeout(tapTimer);
                    tapTimer = null;

                    heart.classList.add('animate');
                    triggerLike(true); // Like ko force true karein

                    setTimeout(() => {
                        heart.classList.remove('animate');
                    }, 700);
                }
            });
        }

        function setupReelController() {
            const videos = document.querySelectorAll('.reel-video');

            const unmuteAll = () => {
                videos.forEach(v => v.muted = false);
                document.removeEventListener('click', unmuteAll);
                document.removeEventListener('touchstart', unmuteAll);
            };
            document.addEventListener('click', unmuteAll);
            document.addEventListener('touchstart', unmuteAll);

            const observerOptions = {
                root: container,
                threshold: 0.6
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const card = video.closest('.reel-card');
                    const sheet = card.querySelector('.comment-sheet');

                    if (entry.isIntersecting) {
                        video.play().catch(err => console.log("Autoplay waiting"));
                    } else {
                        video.pause();
                        if (sheet) sheet.classList.remove('open');
                    }
                });
            }, observerOptions);

            videos.forEach(video => observer.observe(video));
        }

        loadReels();
    </script>

</body>
</html>

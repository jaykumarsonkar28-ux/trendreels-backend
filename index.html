<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main reels container for vertical magnetic scroll 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox ke liye scrollbar chupane ke liye */
        }
        .reels-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari ke liye scrollbar chupane ke liye */
        }

        /* Single reel section covering full screen 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video styling to fit 9:16 screen perfectly 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Video ko stretch hone se bachane ke liye */
        }

        /* Overlay text for Title on top of video 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 40px;
            left: 20px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .reel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- Reels Container -->
    <div class="reels-container" id="reelsContainer">
        <!-- Videos abhi humne dummy rakhi hain, baad mein JavaScript se aayengi -->
        <div class="reel-card">
            <video class="reel-video" src="https://www.w3schools.com/html/mov_bbb.mp4" loop autoplay muted></video>
            <div class="reel-overlay">
                <div class="reel-title">Trending Reel 1</div>
            </div>
        </div>
        
        <div class="reel-card">
            <video class="reel-video" src="https://www.w3schools.com/html/movie.mp4" loop autoplay muted></video>
            <div class="reel-overlay">
                <div class="reel-title">Trending Reel 2</div>
            </div>
        </div>
    </div>

</body>
</html>

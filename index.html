<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendReels App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Main Reels Container 🧲 */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Single Reel Card 📱 */
        .reel-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-color: #111;
        }

        /* Video Styling 🎬 */
        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Right Side Buttons Container ↕️ */
        .reels-buttons {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 12; /* Video aur overlay se upar rakhne ke liye */
        }

        /* Individual Button Style 🔘 */
        .action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        .action-btn:active {
            transform: scale(0.9);
        }

        /* Profile aur Caption Overlay 💬 */
        .reel-overlay {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 80px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            pointer-events: none; /* Clicks ko bypass karke seedhe video tak pahunchata hai */
        }
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }
        .username {
            font-size: 16px;
            font-weight: bold;
        }
        .reel-caption {
            font-size: 14px;
            color: #e6e6e6;
        }

        /* Big Heart Animation Popup ❤️ */
        .heart-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 90px;
            z-index: 11;
            pointer-events: none;
            opacity: 0;
        }
        /* Instagram Jaisa Pop aur Smooth Fade-out Animation */
        .heart-popup.animate {
            animation: heartPopEffect 0.7s ease-in-out forwards;
        }
        @keyframes heartPopEffect {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* Comment Bottom Sheet (Sliding Panel) 📋 */
        .comment-sheet {
            position: absolute;
            bottom: -50vh;
            left: 0;
            width: 100%;
            height: 50vh;
            background: #1a1a1a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 20;
            transition: bottom 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            padding: 20px;
            overflow-y: auto;
        }
        .comment-sheet.open {
            bottom: 0;
        }
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .comment-item {
            margin-bottom: 12px;
            font-size: 14px;
        }
        .comment-user {
            font-weight: bold;
            color: #3897f0;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsContainer"></div>

    <script>
        const jsonUrl = 'https://jaykumarsonkar28-ux.github.io/trendreels-backend/reels.json?v=' + new Date().getTime();
        const container = document.getElementById('reelsContainer');

        async function loadReels() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                for (const reel of data) {
                    const card = document.createElement('div');
                    card.className = 'reel-card';
                    
                    let commentsHTML = '';
                    if(reel.comments) {
                        reel.comments.forEach(c => {
                            commentsHTML += `
                                <div class="comment-item">
                                    <span class="comment-user">@${c.username}</span>
                                    <span class="comment-text">${c.text}</span>
                                </div>`;
                        });
                    }

                    // Saare inline event handlers (onclick/ondblclick) hata diye hain
                    card.innerHTML = `
                        <video class="reel-video" src="${reel.video_url}" loop muted playsinline></video>
                        <div class="heart-popup">❤️</div>
                        
                        <div class="reels-buttons">
                            <button class="action-btn like-btn">🤍</button>
                            <button class="action-btn comment-btn">💬</button>
                        </div>

                        <div class="reel-overlay">
                            <div class="profile-section">
                                <img class="profile-pic" src="${reel.profile_pic || 'https://via.placeholder.com/35'}" alt="profile">
                                <span class="username">@${reel.username}</span>
                            </div>
                            <div class="reel-caption">${reel.caption}</div>
                        </div>

                        <div class="comment-sheet">
                            <div class="sheet-header">
                                <h3>Comments</h3>
                                <button class="close-btn">✕</button>
                            </div>
                            <div class="comments-list">${commentsHTML || '<p style="color:#777;">No comments yet</p>'}</div>
                        </div>
                    `;
                    
                    // Card bante hi uske andar ke events bind karenge
                    bindReelEvents(card);
                    container.appendChild(card);
                }

                setupReelController();

            } catch (error) {
                console.error('Reels load karne mein dikkat aayi:', error);
            }
        }

        // Har ek Reel Card ke liye clean events setup
        function bindReelEvents(card) {
            const video = card.querySelector('.reel-video');
            const heart = card.querySelector('.heart-popup');
            const likeBtn = card.querySelector('.like-btn');
            const commentBtn = card.querySelector('.comment-btn');
            const closeBtn = card.querySelector('.close-btn');
            const sheet = card.querySelector('.comment-sheet');

            // 1. Side Like Button Action
            likeBtn.addEventListener('click', (e) => {
                likeBtn.innerText = likeBtn.innerText === '🤍' ? '❤️' : '🤍';
            });

            // 2. Open Comments
            commentBtn.addEventListener('click', () => {
                sheet.classList.add('open');
            });

            // 3. Close Comments
            closeBtn.addEventListener('click', () => {
                sheet.classList.remove('open');
            });

            // 4. Single-Tap (Play/Pause) aur Double-Tap (Like) ek saath handle karne ki logic
            let tapTimer = null;
            video.addEventListener('click', () => {
                if (!tapTimer) {
                    tapTimer = setTimeout(() => {
                        // Agar 250ms ke andar dusra click nahi aaya toh Single Tap chalega
                        if (video.paused) {
                            video.play().catch(err => console.log(err));
                        } else {
                            video.pause();
                        }
                        tapTimer = null;
                    }, 250);
                } else {
                    // Agar 250ms ke andar dubara click aa gaya toh Double Tap chalega
                    clearTimeout(tapTimer);
                    tapTimer = null;

                    // Heart popup trigger
                    heart.classList.add('animate');
                    likeBtn.innerText = '❤️';

                    setTimeout(() => {
                        heart.classList.remove('animate');
                    }, 700); // Animation poori hote hi class remove ho jayegi
                }
            });
        }

        function setupReelController() {
            const videos = document.querySelectorAll('.reel-video');

            // Sabhi mobile aur desktop browsers ke liye unmuting event listener
            const unmuteAll = () => {
                videos.forEach(v => v.muted = false);
                document.removeEventListener('click', unmuteAll);
                document.removeEventListener('touchstart', unmuteAll);
            };
            document.addEventListener('click', unmuteAll);
            document.addEventListener('touchstart', unmuteAll);

            const observerOptions = {
                root: container,
                threshold: 0.6
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const card = video.closest('.reel-card');
                    const sheet = card.querySelector('.comment-sheet');

                    if (entry.isIntersecting) {
                        video.play().catch(err => console.log("Autoplay waiting"));
                    } else {
                        video.pause();
                        sheet.classList.remove('open'); // Swipe karte hi comments panel automatic band ho jaye
                    }
                });
            }, observerOptions);

            videos.forEach(video => observer.observe(video));
        }

        loadReels();
    </script>

</body>
</html>
